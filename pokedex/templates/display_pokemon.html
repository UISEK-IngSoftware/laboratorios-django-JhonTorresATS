{% extends "base.html" %}

{% block title %}Detalles del Pokemon{% endblock title %}

{% block content %}
<p>Has elegido el pokemon: <strong>{{ pokemon.name|capfirst }}</strong></p>
<p>Detalles del pokemon:</p>
<ul>
    <li>Peso: {{ pokemon.weight }} kg.</li>
    <li>Altura: {{ pokemon.height }} cm.</li>
</ul>
{% endblock content %}

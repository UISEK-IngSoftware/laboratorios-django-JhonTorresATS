{% extends "base.html" %}
{% block title %}Pagina Inicial{% endblock title %}
{% block content %}
<h3>Pokemons</h3>
<ul class="list-group">
    {% for pokemon in pokemons %}
    <li class="list-group-item">
        <a href="{% url 'pokedex:pokemon' pokemon_id=pokemon.id %}">{{ pokemon.name|capfirst }}</a>
    </li>
    {% endfor %}
</ul>
<h3>Trainers</h3>
<ul class="list-group">
    {% for trainer in trainers %}
    <li class="list-group-item">
        <a href="{% url 'pokedex:trainer_details' trainer_id=trainer.id %}">{{ trainer }}</a>
    </li>
    {% endfor %}
</ul>
{% endblock content %}
